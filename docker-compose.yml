version: '3.8'

services:
  # 🐘 Banco de Dados: PostgreSQL 16
  db:
    image: postgres:16-alpine
    container_name: ecotrack_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ecotrack_development}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 🔎 PGWeb: Interface para você debugar o banco no navegador (Porta 8081)
  pgweb:
    image: sosedoff/pgweb
    container_name: ecotrack_pgweb
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-ecotrack_development}?sslmode=disable
    depends_on:
      - db

  # 🌐 API Rails: O core que atende o Dashboard e o App Mobile
  api:
    build: .
    container_name: ecotrack_api
    command: bash -c "rm -f tmp/pids/server.pid && ./bin/rails server -b 0.0.0.0"
    ports:
      - "3000:3000"
    volumes:
      - .:/rails
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-ecotrack_development}
    env_file: .env
    depends_on:
      - db

  # ⚙️ Worker MQTT: Ingestão de telemetria conectada ao HiveMQ Cloud
  mqtt_worker:
    build: .
    container_name: ecotrack_mqtt_worker
    command: ./bin/mqtt_worker
    restart: unless-stopped
    volumes:
      - .:/rails
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-ecotrack_development}
    env_file: .env
    depends_on:
      - db

  # 🧠 Jobs (Solid Queue): Processa as mensagens do MQTT e aciona a IA
  jobs:
    build: .
    container_name: ecotrack_jobs
    command: ./bin/jobs
    restart: unless-stopped
    volumes:
      - .:/rails
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-ecotrack_development}
    env_file: .env
    depends_on:
      - db

volumes:
  postgres_data:
