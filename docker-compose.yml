version: '3.8'

services:
  # 🐘 PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: ecotrack_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecotrack_development
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  # 🔴 Redis
  redis:
    image: redis:7-alpine
    container_name: ecotrack_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  # 📡 MQTT Broker
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: ecotrack_mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    command: >
      sh -c "
      echo 'listener 1883 0.0.0.0' > /mosquitto/config/mosquitto.conf &&
      echo 'allow_anonymous true' >> /mosquitto/config/mosquitto.conf &&
      /usr/sbin/mosquitto -c /mosquitto/config/mosquitto.conf
      "

  # 🌐 PGWeb
  pgweb:
    image: sosedoff/pgweb
    container_name: ecotrack_pgweb
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/ecotrack_development?sslmode=disable
    depends_on:
      - db

  # 🚀 API Rails
  api:
    build: .
    container_name: ecotrack_api
    command: bash -c "rm -f tmp/pids/server.pid && ./bin/rails server -b 0.0.0.0"
    ports:
      - "3000:3000"
    volumes:
      - .:/rails
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://postgres:postgres@db:5432/ecotrack_development
      REDIS_URL: redis://redis:6379/0
      MQTT_HOST: mosquitto
    env_file: .env
    depends_on:
      - db
      - redis
      - mosquitto

  # ⚙️ Worker MQTT
  mqtt_worker:
    build: .
    container_name: ecotrack_mqtt_worker
    command: ./bin/mqtt_worker
    restart: unless-stopped
    volumes:
      - .:/rails
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://postgres:postgres@db:5432/ecotrack_development
      MQTT_HOST: mosquitto
    env_file: .env
    depends_on:
      - db
      - mosquitto

  # 🧠 Jobs
  jobs:
    build: .
    container_name: ecotrack_jobs
    command: ./bin/jobs
    restart: unless-stopped
    volumes:
      - .:/rails
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://postgres:postgres@db:5432/ecotrack_development
      REDIS_URL: redis://redis:6379/0
    env_file: .env
    depends_on:
      - db
      - redis

  # 🛰️ ChirpStack
  chirpstack:
    image: chirpstack/chirpstack:4
    container_name: ecotrack_chirpstack
    restart: unless-stopped
    command: --config /etc/chirpstack
    ports:
      - "8080:8080"
    volumes:
      - ./docker/chirpstack:/etc/chirpstack
    depends_on:
      - db
      - redis
      - mosquitto

volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_log:
