default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("POSTGRES_HOST", "localhost") %>
  user: <%= ENV.fetch("POSTGRES_USER", "postgres") %>
  password: <%= ENV.fetch("POSTGRES_PASSWORD", "") %>

development:
  # Configuração do banco principal (suas lixeiras, tenants, etc)
  primary:
    <<: *default
    database: <%= ENV.fetch("POSTGRES_DB", "ecotrack_development") %>

  # 🔥 ADICIONE ISSO AQUI: Configuração para o Solid Queue
  queue:
    <<: *default
    database: <%= ENV.fetch("POSTGRES_DB", "ecotrack_development") %>
    # O segredo está aqui: ele usa um schema diferente ou o mesmo banco,
    # mas o Rails precisa saber que ele é o responsável pela fila.
    migrations_paths: db/queue_migrate
